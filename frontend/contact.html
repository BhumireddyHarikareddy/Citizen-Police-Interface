<!DOCTYPE html> 
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us - SecureSight</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: url('uploads/police.png') no-repeat center center fixed;
      background-size: cover;
      filter: brightness(1.3);
      color: #fff;
    }

    /* Navbar */
    header {
      background-color: rgba(13, 37, 63, 0.95);
      color: white;
      padding: 10px 0;
    }

    .nav-container {
      width: 90%;
      max-width: 1100px;
      margin: auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
    }

    .logo {
      display: flex;
      flex-direction: column;
    }
    .logo h1 {
      font-size: 1.5em;
      margin: 0;
    }
    .logo p {
      font-size: 0.9em;
      margin: 0;
      opacity: 0.8;
    }

    nav ul {
      list-style: none;
      display: flex;
      gap: 20px;
      margin: 0;
      padding: 0;
    }

    nav ul li a {
      color: white;
      text-decoration: none;
      padding: 6px 12px;
      border-radius: 5px;
      font-weight: bold;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    nav ul li a:hover,
    nav ul li a.active {
      background-color: #00b4d8;
      color: #fff;
    }

    .police-login {
      font-size: 16px;
      color: white;
      text-decoration: none;
      font-weight: bold;
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 6px 12px;
      border-radius: 5px;
      background-color: #0077b6;
      transition: background 0.3s;
    }

    .police-login:hover {
      background-color: #023e8a;
    }

    /* Contact Section */
    .contact-container {
      max-width: 700px;
      margin: 50px auto;
      background: rgba(255, 255, 255, 0.9);
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
      color: #000;
    }

    .contact-container h1 {
      text-align: center;
      margin-bottom: 20px;
      color: #0d253f;
    }

    .contact-container form {
      display: flex;
      flex-direction: column;
    }

    .contact-container label {
      margin: 10px 0 5px;
      font-weight: bold;
    }

    .contact-container input,
    .contact-container textarea {
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 15px;
    }

    .contact-container textarea {
      resize: vertical;
      min-height: 120px;
    }

    .contact-container button {
      margin-top: 15px;
      padding: 12px;
      background: #0077b6;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.3s;
    }

    .contact-container button:hover {
      background: #023e8a;
    }
  </style>
</head>
<body>
  <!-- Navbar -->
  <header>
    <div class="nav-container">
      <div class="logo">
        <h1>SecureSight</h1>
        <p>Public Safety & Reporting Portal</p>
      </div>
      <nav>
        <ul>
          <li><a href="home.html"><i class="fas fa-home"></i> Home</a></li>
          <li><a href="faqs.html"><i class="fas fa-question-circle"></i> FAQs</a></li>
          <li><a href="about.html"><i class="fas fa-info-circle"></i> About</a></li>
          <li><a href="contact.html" class="active"><i class="fas fa-envelope"></i> Contact Us</a></li>
        </ul>
      </nav>
      <a href="login.html" class="police-login"><i class="fas fa-user-shield"></i> Police Login</a>
    </div>
  </header>

  <!-- Contact Section -->
  <div class="contact-container">
    <h1>Contact Us</h1>
    <form>
      <label for="name">Full Name</label>
      <input type="text" id="name" name="name" placeholder="Enter your full name" required>

      <label for="email">Email Address</label>
      <input type="email" id="email" name="email" placeholder="Enter your email" required>

      <label for="message">Your Message</label>
      <textarea id="message" name="message" placeholder="Write your message here..." required></textarea>

      <button type="submit">Send Message</button>
    </form>
  </div>
</body>
</html>
