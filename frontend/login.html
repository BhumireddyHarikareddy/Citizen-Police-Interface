<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Police Login</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;

      /* ✅ FIXED IMAGE PATH */
      background: url("https://citizen-police-interface.onrender.com/uploads/police.png") no-repeat center center/cover;
    }

    .login-container {
      background: rgba(0, 0, 0, 0.7);
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.3);
      width: 300px;
      color: white;
      text-align: center;
    }

    .login-container h2 {
      margin-bottom: 20px;
      color: #f8f9fa;
    }

    .login-container input {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border: none;
      border-radius: 5px;
    }

    .login-container button {
      width: 100%;
      padding: 10px;
      background: #007BFF;
      border: none;
      border-radius: 5px;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    .login-container button:hover {
      background: #0056b3;
    }

    .login-container p {
      margin-top: 15px;
      font-size: 14px;
    }

    .login-container a {
      color: #0dcaf0;
      text-decoration: none;
    }

    .login-container a:hover {
      text-decoration: underline;
    }
  </style>
</head>

<body>

  <div class="login-container">
    <h2>Police Login</h2>

    <!-- ✅ FIXED FORM -->
    <form id="loginForm">
      <input type="text" name="username" placeholder="Enter Username" required>
      <input type="password" name="password" placeholder="Enter Password" required>
      <button type="submit">Login</button>
    </form>

    <p>Forgot password? <a href="#">Reset</a></p>
  </div>

  <!-- ✅ ADD SCRIPT HERE -->
  <script>
    document.getElementById("loginForm").addEventListener("submit", async function(e) {
      e.preventDefault();

      const username = document.querySelector("input[name='username']").value;
      const password = document.querySelector("input[name='password']").value;

      try {
        const response = await fetch('https://citizen-police-interface.onrender.com/api/login', {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ username, password })
        });

        const result = await response.json();

        if (result.success) {
          alert("Login successful");
          window.location.href = "dashboard.html";
        } else {
          alert("Invalid username or password");
        }

      } catch (err) {
        alert("Server error. Try again.");
        console.error(err);
      }
    });
  </script>

</body>
</html>
