<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>View Wanted Criminals</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background: #f4f4f9;
    }
    .container {
      max-width: 900px;
      margin: 40px auto;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.12);
      padding: 32px 24px;
    }
    h2 {
      text-align: center;
      color: #0d253f;
      margin-bottom: 24px;
    }
    .wanted-list {
      display: flex;
      flex-wrap: wrap;
      gap: 24px;
      justify-content: center;
    }
    .wanted-card {
      background: #f9f9f9;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.10);
      width: 270px;
      padding: 18px 14px 14px 14px;
      margin-bottom: 18px;
      text-align: center;
      position: relative;
    }
    .wanted-card img {
      max-width: 120px;
      border-radius: 8px;
      margin-bottom: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.13);
    }
    .wanted-card h3 {
      margin: 8px 0 4px 0;
      color: #0d253f;
      font-size: 1.15em;
    }
    .wanted-card p {
      margin: 4px 0;
      font-size: 0.98em;
      color: #333;
    }
    .response-form {
      margin-top: 12px;
      background: #e9ecef;
      border-radius: 8px;
      padding: 10px;
      text-align: left;
    }
    .response-form label {
      font-weight: bold;
      margin-top: 8px;
      display: block;
    }
    .response-form input, .response-form textarea {
      width: 100%;
      padding: 7px;
      margin-bottom: 8px;
      border: 1px solid #ccc;
      border-radius: 5px;
      font-size: 14px;
    }
    .response-form button {
      background: #0d253f;
      color: white;
      padding: 8px 0;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      width: 100%;
      font-size: 15px;
      font-weight: bold;
      transition: background 0.3s;
    }
    .response-form button:hover {
      background: #123d6a;
    }
    .response-success {
      color: green;
      font-weight: bold;
      margin-top: 8px;
      text-align: center;
    }
    .toggle-form-button {
      background: #0d253f;
      color: white;
      border: none;
      border-radius: 6px;
      padding: 8px 12px;
      cursor: pointer;
      margin: 8px 0;
      width: 100%;
      transition: background 0.3s;
    }
    .toggle-form-button:hover {
      background: #123d6a;
    }
    .status {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 0.85em;
      font-weight: bold;
      margin-bottom: 10px;
    }
    .status.missing {
      background: #ffcccc;
      color: #cc0000;
    }
    .status.found {
      background: #ccffcc;
      color: #00cc00;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Wanted Criminals</h2>
    <div id="wantedList" class="wanted-list"></div>
  </div>
  <script>
    const API_BASE = 'https://citizen-police-interface.onrender.com';

    function createWantedCard(item) {
      const card = document.createElement('div');
      card.className = 'wanted-card';
      card.innerHTML = `
        <img src="${item.photo || ''}" alt="Wanted Criminal Photo" onerror="this.onerror=null;this.src='https://via.placeholder.com/120x120?text=No+Image'">
        <h3>${item.name || 'Unknown'}</h3>
        <p><strong>Age:</strong> ${item.age || 'N/A'}</p>
        <p><strong>Gender:</strong> ${item.gender || 'N/A'}</p>
        <p><strong>Crime:</strong> ${item.crime || 'N/A'}</p>
        <p><strong>Last Seen:</strong> ${item.last_seen_location || 'N/A'}</p>
        <p><strong>Contact:</strong> ${item.contact || 'N/A'}</p>
        <p class="status ${item.status === 'Caught' ? 'found' : 'missing'}">${item.status || 'Wanted'}</p>
        <button class="toggle-form-button" type="button" onclick="toggleResponseForm(${item.id})">Report a sighting</button>
        <form id="response-form-${item.id}" class="response-form" style="display:none;">
          <label for="location-${item.id}">Location</label>
          <input type="text" id="location-${item.id}" name="location" required>
          <label for="time-${item.id}">Date/Time</label>
          <input type="datetime-local" id="time-${item.id}" name="time" required>
          <label for="person-${item.id}">Your Name</label>
          <input type="text" id="person-${item.id}" name="person" required>
          <label for="contact-${item.id}">Contact</label>
          <input type="text" id="contact-${item.id}" name="contact" required>
          <label for="aadhaar-${item.id}">Aadhaar</label>
          <input type="text" id="aadhaar-${item.id}" name="aadhaar">
          <label for="organization-${item.id}">Organization</label>
          <input type="text" id="organization-${item.id}" name="organization">
          <label for="designation-${item.id}">Designation</label>
          <input type="text" id="designation-${item.id}" name="designation">
          <label for="details-${item.id}">Details</label>
          <textarea id="details-${item.id}" name="details" rows="3"></textarea>
          <button type="button" onclick="submitWantedResponse(${item.id})">Submit Sighting</button>
          <div id="response-message-${item.id}" class="response-success"></div>
        </form>
      `;
      return card;
    }

    function toggleResponseForm(id) {
      const form = document.getElementById(`response-form-${id}`);
      if (!form) return;
      form.style.display = form.style.display === 'none' ? 'block' : 'none';
    }

    async function submitWantedResponse(id) {
      const form = document.getElementById(`response-form-${id}`);
      const msg = document.getElementById(`response-message-${id}`);
      if (!form || !msg) return;
      msg.style.color = 'green';
      msg.textContent = 'Submitting...';

      const payload = {
        wanted_id: id,
        location: document.getElementById(`location-${id}`).value,
        time: document.getElementById(`time-${id}`).value,
        person: document.getElementById(`person-${id}`).value,
        contact: document.getElementById(`contact-${id}`).value,
        details: document.getElementById(`details-${id}`).value,
        aadhaar: document.getElementById(`aadhaar-${id}`).value,
        organization: document.getElementById(`organization-${id}`).value,
        designation: document.getElementById(`designation-${id}`).value
      };

      try {
        const res = await fetch(`${API_BASE}/api/wanted-responses`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        const json = await res.json();
        if (res.ok && json.success) {
          msg.style.color = 'green';
          msg.textContent = 'Sighting submitted successfully.';
          form.reset();
          form.style.display = 'none';
        } else {
          msg.style.color = 'red';
          msg.textContent = json.message || 'Submission failed.';
        }
      } catch (err) {
        msg.style.color = 'red';
        msg.textContent = 'Unable to submit sighting.';
        console.error(err);
      }
    }

    async function loadWantedList() {
      const list = document.getElementById('wantedList');
      try {
        const res = await fetch(`${API_BASE}/api/wanted`);
        const json = await res.json();
        if (!json.success || !Array.isArray(json.data) || json.data.length === 0) {
          list.innerHTML = '<p style="text-align:center; width:100%;">No wanted criminals found.</p>';
          return;
        }
        list.innerHTML = '';
        json.data.forEach(item => list.appendChild(createWantedCard(item)));
      } catch (err) {
        list.innerHTML = '<p style="text-align:center; width:100%; color:red;">Unable to load wanted criminals.</p>';
        console.error(err);
      }
    }

    loadWantedList();
  </script>
</body>
</html>
