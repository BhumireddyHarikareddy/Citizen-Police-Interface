<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Missing Person Sightings</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    h2 { color: #0d253f; text-align: center; }
    table { border-collapse: collapse; width: 100%; margin-top: 20px; }
    th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
    th { background: #f4f4f4; color: #0d253f; font-weight: bold; }
    tr:nth-child(even) { background: #f9f9f9; }
  </style>
</head>
<body>
  <h2>Missing Person Sightings Submitted</h2>
  <table>
    <thead>
      <tr>
        <th>ID</th>
        <th>Missing ID</th>
        <th>Location</th>
        <th>Time</th>
        <th>Person</th>
        <th>Contact</th>
        <th>Aadhaar</th>
        <th>Organization</th>
        <th>Designation</th>
        <th>Details</th>
      </tr>
    </thead>
    <tbody id="responseList">
      <!-- Responses will be loaded here -->
    </tbody>
  </table>
  <script>
    async function fetchResponses() {
      const res = await fetch('http://localhost:3005/api/missing-responses');
      const data = await res.json();
      if (!data.success) {
        document.getElementById('responseList').innerHTML = '<tr><td colspan="10" style="text-align:center; color:red;">Unable to load sightings.</td></tr>';
        return;
      }
      const responseList = document.getElementById('responseList');
      responseList.innerHTML = '';
      if (!data.data || data.data.length === 0) {
        responseList.innerHTML = '<tr><td colspan="10" style="text-align:center;">No sightings submitted yet.</td></tr>';
        return;
      }
      data.data.forEach(resp => {
        const row = document.createElement('tr');
        row.innerHTML = `
          <td>${resp.id}</td>
          <td>${resp.missing_id}</td>
          <td>${resp.location}</td>
          <td>${resp.time}</td>
          <td>${resp.person}</td>
          <td>${resp.contact}</td>
          <td>${resp.aadhaar}</td>
          <td>${resp.organization}</td>
          <td>${resp.designation}</td>
          <td>${resp.details || ''}</td>
        `;
        responseList.appendChild(row);
      });
    }
    fetchResponses();
  </script>
</body>
</html>
