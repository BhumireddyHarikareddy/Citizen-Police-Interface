<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SecureSight – Report a Sighting</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", Arial, sans-serif;
      background: url('uploads/police.png') no-repeat center center fixed;
      background-size: cover;
      color: #fff;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* Dark overlay for readability */
    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.55);
      z-index: -1;
    }

    /* Navbar */
    header {
      background-color: rgba(13, 37, 63, 0.95);
      color: white;
      padding: 10px 0;
    }

    .nav-container {
      width: 90%;
      max-width: 1100px;
      margin: auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
    }

    .logo {
      display: flex;
      flex-direction: column;
    }
    .logo h1 {
      font-size: 1.5em;
      margin: 0;
    }
    .logo p {
      font-size: 0.9em;
      margin: 0;
      opacity: 0.8;
    }

    nav ul {
      list-style: none;
      display: flex;
      gap: 20px;
      margin: 0;
      padding: 0;
    }
    nav ul li a {
      color: white;
      text-decoration: none;
      padding: 6px 12px;
      border-radius: 5px;
      font-weight: bold;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    nav ul li a:hover,
    nav ul li a.active {
      background-color: #00b4d8;
      color: #fff;
    }

    .police-login {
      font-size: 16px;
      color: white;
      text-decoration: none;
      font-weight: bold;
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 6px 12px;
      border-radius: 5px;
      background-color: #0077b6;
      transition: background 0.3s;
    }
    .police-login:hover {
      background-color: #023e8a;
    }

    /* Main form section */
    main {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 30px;
    }

    .form-container {
      background: rgba(255, 255, 255, 0.08);
      padding: 30px;
      border-radius: 15px;
      width: 100%;
      max-width: 650px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
    }

    .form-container h2 {
      text-align: center;
      color: #00b4d8;
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin: 12px 0 6px;
      font-weight: bold;
      font-size: 14px;
    }

    input, select, textarea {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      margin-bottom: 15px;
      font-size: 14px;
      color: #000;
    }

    textarea {
      resize: none;
      height: 100px;
    }

    button {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #0077b6, #00b4d8);
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: bold;
      color: white;
      cursor: pointer;
      transition: 0.3s;
      box-shadow: 0 6px 12px rgba(0, 0, 0, 0.3);
    }

    button:hover {
      background: linear-gradient(135deg, #00b4d8, #023e8a);
      transform: translateY(-2px);
    }

    footer {
      background-color: rgba(33, 37, 41, 0.9);
      text-align: center;
      padding: 12px;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <!-- Navbar -->
  <header>
    <div class="nav-container">
      <div class="logo">
        <h1>SecureSight</h1>
        <p>Public Safety & Reporting Portal</p>
      </div>
      <nav>
        <ul>
          <li><a href="index.html"><i class="fas fa-home"></i> Home</a></li>
          <li><a href="#"><i class="fas fa-question-circle"></i> FAQs</a></li>
          <li><a href="#"><i class="fas fa-info-circle"></i> About</a></li>
          <li><a href="#"><i class="fas fa-clipboard-check"></i> Status</a></li>
          <li><a href="#"><i class="fas fa-envelope"></i> Contact Us</a></li>
        </ul>
      </nav>
      <a href="#" class="police-login"><i class="fas fa-user-shield"></i> Police Login</a>
    </div>
  </header>

  <!-- Report form -->
  <main>
    <div class="form-container">
      <h2>📍 Report a Sighting</h2>
      <form>
        <label for="name">Your Name (optional)</label>
        <input type="text" id="name" placeholder="Enter your name">

        <label for="contact">Contact Number (optional)</label>
        <input type="text" id="contact" placeholder="Enter contact number">

        <label for="category">Category</label>
        <select id="category">
          <option value="missing">Missing Person</option>
          <option value="criminal">Wanted Criminal</option>
          <option value="problem">Other Problem Report</option>
        </select>

        <label for="location">Location</label>
        <input type="text" id="location" placeholder="Enter location/address">

        <label for="time">Time Seen</label>
        <input type="datetime-local" id="time">

        <label for="notes">Additional Notes</label>
        <textarea id="notes" placeholder="Describe what you saw..."></textarea>

        <label for="photo">Upload Photo (optional)</label>
        <input type="file" id="photo">

        <button type="submit">Submit Report</button>
      </form>
    </div>
  </main>

  <!-- Footer -->
  <footer>
    © 2025 SecureSight. All rights reserved.
  </footer>
</body>
</html>
